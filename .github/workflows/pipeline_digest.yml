name: Weekly Pipeline Digest

# §15.5 — a Friday summary of the week's data_quality_history + health_history:
# coverage trend, data-quality score, DEGRADED/ABORT runs, abort rate. Committed
# as pipeline_digest.md so slow drift is visible before it is a crisis.
on:
  schedule:
    # 6:30 PM EDT (22:30 UTC) Fridays — after the heartbeat, end of the trading week.
    - cron: '30 22 * * 5'
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build weekly digest
        run: python pipeline_digest.py

      - name: Commit digest
        run: |
          git config user.name "AI Investor Bot"
          git config user.email "ai-investor-bot@users.noreply.github.com"
          git add pipeline_digest.md
          git diff --staged --quiet && echo "No digest change" || \
            git commit -m "chore: weekly pipeline-integrity digest [skip ci]"

      - name: Push digest
        run: git push
