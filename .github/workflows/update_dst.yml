name: DST Cron Update

on:
  schedule:
    # March 15 at 12:00 UTC — after DST spring forward (second Sunday of March, ~Mar 8-14)
    - cron: '0 12 15 3 *'
    # November 8 at 07:00 UTC — after DST fall back (first Sunday of November, Nov 1–7)
    - cron: '0 7 8 11 *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - name: Detect UTC offset and update cron expressions
        run: |
          python3 - <<'EOF'
          import re
          from datetime import datetime
          from zoneinfo import ZoneInfo

          tz = ZoneInfo("America/New_York")
          offset_hours = int(datetime.now(tz).utcoffset().total_seconds() / 3600)  # -4 or -5

          # market_data.yml: three staggered triggers (7:00 / 8:00 / 8:30 AM ET)
          h7  = 7  - offset_hours
          h8  = 8  - offset_hours
          # health_check.yml: 11:00 AM ET
          hc  = 11 - offset_hours

          # market_data.yml — replace entire schedule block (3 crons) as a unit
          mkt_block_edt = (
              "    - cron: '0 11 * * 1-5'   # 7:00 AM EDT — earliest attempt\n"
              "    - cron: '0 12 * * 1-5'   # 8:00 AM EDT — primary\n"
              "    - cron: '30 12 * * 1-5'  # 8:30 AM EDT — fallback"
          )
          mkt_block_est = (
              "    - cron: '0 12 * * 1-5'   # 7:00 AM EST — earliest attempt\n"
              "    - cron: '0 13 * * 1-5'   # 8:00 AM EST — primary\n"
              "    - cron: '30 13 * * 1-5'  # 8:30 AM EST — fallback"
          )
          mkt_old = mkt_block_est if offset_hours == -4 else mkt_block_edt
          mkt_new = mkt_block_edt if offset_hours == -4 else mkt_block_est

          changed = False

          path = ".github/workflows/market_data.yml"
          text = open(path).read()
          new_text = text.replace(mkt_old, mkt_new)
          if new_text != text:
              open(path, "w").write(new_text)
              changed = True
              print(f"Updated {path} for UTC{offset_hours}")

          path = ".github/workflows/health_check.yml"
          text = open(path).read()
          new_text = re.sub(r"cron: '0 \d+ \* \* 1-5'", f"cron: '0 {hc} * * 1-5'", text)
          if new_text != text:
              open(path, "w").write(new_text)
              changed = True
              print(f"Updated {path} for UTC{offset_hours}")

          if not changed:
              print("No changes needed — crons already correct for current offset.")
          EOF

      - name: Commit if changed
        run: |
          git config user.name "DST Bot"
          git config user.email "dst-bot@users.noreply.github.com"
          git add .github/workflows/market_data.yml .github/workflows/health_check.yml
          git diff --staged --quiet || git commit -m "chore: DST cron update [skip ci]"
          git push
