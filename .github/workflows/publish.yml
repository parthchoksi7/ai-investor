name: Publish to Supabase

# Triggered when the cloud routine commits portfolio_snapshot.json.
# Anthropic's cloud blocks Supabase (HTTP 403), so publish.py writes
# portfolio_snapshot.json to the repo instead. This workflow picks it up
# and runs publish.py with full internet access and Supabase secrets.

on:
  push:
    paths:
      - portfolio_snapshot.json
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Publish to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python publish.py
