name: Market Data Fetch

on:
  schedule:
    # Three staggered triggers (EDT = UTC-4) — GitHub silently skips scheduled runs under load;
    # redundant entries ensure at least one fires well before the 9:45 AM ET trading routine.
    # In winter (EST = UTC-5): update all three to '0 12', '30 12', '0 13'
    - cron: '0 11 * * 1-5'   # 7:00 AM EDT — earliest attempt
    - cron: '0 12 * * 1-5'   # 8:00 AM EDT — primary
    - cron: '30 12 * * 1-5'  # 8:30 AM EDT — fallback
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore fundamentals cache
        uses: actions/cache@v5
        with:
          path: fundamentals_cache.json
          key: fundamentals-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            fundamentals-${{ runner.os }}-

      - name: Fetch market snapshot
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python fetch_snapshot.py

      - name: Commit market_snapshot.json to repo
        run: |
          git config user.name  "Market Data Bot"
          git config user.email "market-data-bot@users.noreply.github.com"
          git add market_snapshot.json
          # Only commit if the file actually changed
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: market snapshot [skip ci]"

      - name: Push snapshot
        run: git push
