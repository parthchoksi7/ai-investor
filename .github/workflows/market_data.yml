name: Market Data Fetch

on:
  schedule:
    # Three staggered triggers (EDT = UTC-4) — GitHub silently skips scheduled runs under load;
    # redundant entries ensure at least one fires well before the 9:45 AM ET trading routine.
    # In winter (EST = UTC-5): update all three to '0 12', '30 12', '0 13'
    - cron: '0 11 * * 1-5'   # 7:00 AM EDT — earliest attempt
    - cron: '0 12 * * 1-5'   # 8:00 AM EDT — primary
    - cron: '30 12 * * 1-5'  # 8:30 AM EDT — fallback
  workflow_dispatch:
    inputs:
      full_refresh:
        description: 'Refresh all 100 tickers (bypass 50/50 alternate-day split)'
        required: false
        default: false
        type: boolean

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore fundamentals + provider cache
        uses: actions/cache@v5
        with:
          path: |
            fundamentals_cache.json
            provider_cache.json
          key: fundamentals-v2-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            fundamentals-v2-${{ runner.os }}-

      - name: Fetch market snapshot
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FULL_REFRESH: ${{ inputs.full_refresh || 'false' }}
        run: python fetch_snapshot.py

      - name: Commit market_snapshot.json to repo
        run: |
          git config user.name  "Market Data Bot"
          git config user.email "market-data-bot@users.noreply.github.com"
          # factor_history.jsonl is the full-universe point-in-time factor time
          # series appended by fetch_snapshot.py — it MUST be committed here (GH
          # Actions is the only plane that scores the whole universe daily), or
          # factor-persistence / IC analysis silently loses its substrate (same
          # class as the forecasts.jsonl feed-freeze).
          git add market_snapshot.json factor_history.jsonl data_quality_report.json data_quality_history.jsonl research_dossier.json
          # Only commit if the file actually changed
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: market snapshot [skip ci]"

      - name: Push snapshot
        # Bare `git push` fails with "failed to push some refs" if another workflow
        # (pipeline_digest, the EOD publish, a concurrent market_data retry) lands on
        # main first. Rebase-and-retry so a benign push race doesn't drop the snapshot
        # + factor_history + data_quality artifacts (same durability lesson as the
        # routine STEP 5 push). Nothing else rewrites these files, so the rebase is safe.
        run: |
          for i in 1 2 3; do
            git push && exit 0
            echo "push rejected (attempt $i) — rebasing on origin/main and retrying"
            git pull --rebase origin main || exit 1
          done
          git push
